gateway.allowed.configserver.code: ${GATEWAY_ALLOWED_CONFIGSERVER_CODE:6a0fb275-b928-83e9-b42a-8f7020e95ec6}
server:
  port: 12014
  servlet:
    context-path: /mypass-manager/files
spring:
  #  profiles:
  #    default: local
  application:
    name: file-service
  cloud:
    config:
      discovery:
        enabled: true
        service-id: ${SPRING_CLOUD_DISCOVERY_SERVICE_ID:config-server}
      headers:
        X-Gateway-Auth: ${gateway.allowed.configserver.code:changeit}
        X-Service-Name: ${spring.application.name}
  config:
    import: "optional:configserver:"
  servlet:
    multipart:
      enabled: true
      max-file-size: 96MB
      max-request-size: 110MB
      resolve-lazily: false
  session:
    store-type: none
eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:eureka@localhost:8761/eureka
  instance:
    prefer-ip-address: true
springdoc:
  version: @project.version@
  title: @project.name@
  description: @project.description@
  license-name: 'MIT'
  license-url: 'https://github.com/marcoshssilva/MHPasswordManager/blob/main/LICENSE'
---
spring:
  config:
    activate:
      on-profile: local
  data:
    mongodb:
      host: 127.0.0.1
      username: 'sa-files-service'
      password: 'P@sswordFil3s'
      database: 'db_files'
      authentication-database: 'admin'
      authentication-mechanism: 'SCRAM-SHA-1'
  jackson:
    default-property-inclusion: non_null
    serialization:
      fail-on-empty-beans: false
  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: http://127.0.0.1:8080/mypass-manager/auth/
springdoc:
  swagger-ui:
    oauth2-redirect-url: ${SPRINGDOC_SWAGGERUI_OAUTH2_REDIRECT_URL:http://127.0.0.1:8080/mypass-manager/files/swagger-ui/redirect}
    oauth2-authorization-url: ${SPRINGDOC_SWAGGERUI_OAUTH2_AUTHORIZATION_URL:http://127.0.0.1:8080/mypass-manager/auth/oauth2/authorize} # custom, doesnt exists on springdoc open-api
    oauth2-token-url: ${SPRINGDOC_SWAGGERUI_OAUTH2_TOKEN_URL:http://127.0.0.1:8080/mypass-manager/auth/oauth2/token} # custom, doesnt exists on springdoc open-api
    csrf:
      enabled: false
---
spring:
  config:
    activate:
      on-profile: test
  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: http://mhpasswordmanager.test.fake.com
