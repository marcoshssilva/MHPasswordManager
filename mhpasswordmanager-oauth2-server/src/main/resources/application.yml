      enabled: true
      path: /h2
  datasource:
    auth:
      username: 'sa-authorization-server'
      password: 'P@sswordAuthS3rv3r'
      url: 'jdbc:postgresql://localhost:5432/db_auth'
  flyway:
    enabled: true
    url: ${spring.datasource.auth.url}
