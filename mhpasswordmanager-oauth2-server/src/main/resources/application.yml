    port: 6379
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    virtual-host: vhost-password-manager
    username: authorization-server-pm
    password: authorization-server-pm-P@ss
config:
  jwk:
    mode: DATABASE
  oauth:
    mode: DATABASE
  users:
    mode: WEB_CLIENT
    webclient:
      base-url: http://USER-SERVICE/mypass-manager/users
      oauth2:
        registration-id: passwordmanager-global
        client-id: MHPasswordManager-GlobalAdmin
        client-secret: 9f45dc98-8e4f-11ee-b9d1-0242ac120002
        token-uri: ${authorization.issuer-uri}/oauth2/token
        scopes: global:fullAccess
authorization:
  issuer-uri: http://127.0.0.1:8080${server.servlet.context-path}
