server:
  port: 12010
  servlet:
    context-path: /mypass-manager/auth/
spring:
  #  profiles.default: local
  application:
    name: authorization-server
  cloud:
    config:
      discovery:
        enabled: true
        service-id: ${SPRING_CLOUD_DISCOVERY_SERVICE_ID:config-server}
      headers:
        X-Gateway-Auth: ${config.gateway.allowed.configserver.code}
        X-Service-Name: ${spring.application.name}
  config:
    import: "optional:configserver:"
  mvc:
    static-path-pattern: /content/**
eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:eureka@localhost:8761/eureka
  instance:
    prefer-ip-address: true
springdoc:
  version: @project.version@
  title: @project.name@
  description: @project.description@
  license-name: 'MIT'
  license-url: 'https://github.com/marcoshssilva/MHPasswordManager/blob/main/LICENSE'
  swagger-ui:
    oauth2-redirect-url: ${SPRINGDOC_SWAGGERUI_OAUTH2_REDIRECT_URL:http://127.0.0.1:12010/swagger-ui/redirect}
    oauth2-authorization-url: ${SPRINGDOC_SWAGGERUI_OAUTH2_AUTHORIZATION_URL:http://127.0.0.1:12010/oauth2/authorize} # custom doesn't exist on springdoc open-api
    oauth2-token-url: ${SPRINGDOC_SWAGGERUI_OAUTH2_TOKEN_URL:http://127.0.0.1:12010/oauth2/token} # custom doesn't exist on springdoc open-api
    csrf:
      enabled: true
config:
  gateway:
    allowed.configserver.code: ${CONFIG_GATEWAY_ALLOWED_CONFIGSERVER_CODE:}
  jwk:
    mode: CLASSPATH
  oauth:
    mode: MEMORY
  users:
    mode: MEMORY
---
spring:
  config:
    activate.on-profile: embedded-database
  h2:
    console:
      enabled: true
      path: /h2
  flyway:
    enabled: false
config:
  jwk:
    mode: DATABASE
  oauth:
    mode: EMBEDDED
  users:
    mode: EMBEDDED
---
spring:
  cloud.config.discovery.enabled: false
  config:
    activate.on-profile: local
  h2:
