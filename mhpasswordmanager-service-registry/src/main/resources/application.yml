spring:
  application:
    name: eureka-service-registry
  security:
    user:
      name: ${SPRING_SECURITY_USERNAME:eureka}
      password: ${SPRING_SECURITY_PASSWORD:eureka}
server:
  port: 8761
  servlet:
    session:
      cookie:
        http-only: on
        same-site: strict
eureka:
  client:
    enabled: true
    fetch-registry: false
    register-with-eureka: false
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@localhost:${server.port}/eureka
  instance:
    prefer-ip-address: true
logging:
  level:
    com:
      netflix:
        eureka: OFF
        discovery: OFF
management:
  endpoint:
    health:
      show-components: always
      show-details: always
    shutdown:
      enabled: false
  endpoints:
    web:
      exposure:
        include: '*'