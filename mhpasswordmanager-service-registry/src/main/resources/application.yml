spring:
  session:
    store-type: none
  application:
    name: eureka-server
server:
  port: 8761
  servlet:
    session:
      cookie:
        http-only: on
        same-site: strict
eureka:
  client:
    enabled: true
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://127.0.0.1:${server.port}/eureka
  instance:
    prefer-ip-address: true
logging:
  level:
    com:
      netflix:
        eureka: OFF
        discovery: OFF
management:
  endpoint:
    health:
      show-components: always
      show-details: always
    shutdown:
      enabled: false
  endpoints:
    web:
      exposure:
        include: '*'