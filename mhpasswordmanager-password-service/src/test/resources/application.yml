spring:
  application:
    name: password-service-test
  config:
    import:
  cloud:
    config:
      enabled: false
      discovery:
        enabled: false
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:db_passwords;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      dialect: org.hibernate.dialect.H2Dialect
  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: http://mhpasswordmanager.test.fake.com
  session:
    store-type: none
  flyway:
    enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

springdoc:
  version: test
  title: MHPasswordManagerPasswordService
  description: Test configuration
  license-name: MIT
  license-url: https://github.com/marcoshssilva/MHPasswordManager/blob/main/LICENSE
