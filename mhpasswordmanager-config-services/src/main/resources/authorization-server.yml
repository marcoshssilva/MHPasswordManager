  flyway:
    enabled: true
    user: 'sa-authorization-server'
    password: 'P@sswordAuthS3rv3r'
    schemas:
      - 'public'
    url: jdbc:postgresql://postgres-db:5432/db_auth
  session:
    store-type: redis
  redis:
    host: redis
    password: 'MHP@SSW0R3#20230401'
