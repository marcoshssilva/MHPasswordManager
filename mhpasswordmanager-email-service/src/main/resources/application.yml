server:
  port: 12013
  servlet:
    context-path: /mypass-manager/emails
spring:
#  profiles:
#    default: local
  application:
    name: email-service
  cloud:
    config:
      discovery:
        enabled: true
        service-id: ${SPRING_CLOUD_DISCOVERY_SERVICE_ID:config-server}
      headers:
        X-Gateway-Auth: ${config.gateway.allowed.configserver.code:changeit}
        X-Service-Name: ${spring.application.name}
  config:
    import: "optional:configserver:"
  session:
    store-type: none
eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:eureka@localhost:8761/eureka
  instance:
    prefer-ip-address: true
springdoc:
  version: @project.version@
  title: @project.name@
  description: @project.description@
  license-name: 'MIT'
  license-url: 'https://github.com/marcoshssilva/MHPasswordManager/blob/main/LICENSE'
config:
  gateway:
    allowed.configserver.code: ${CONFIG_GATEWAY_ALLOWED_CONFIGSERVER_CODE:changeit}
  mail:
    queues-key:
      send-event: ${CONFIG_MAIL_QUEUES_KEY_SEND_EVENT:email.send-event}